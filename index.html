<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>こどもローマ字タイピング</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>こどもローマ字タイピング</h1>
        <p class="subtitle">かなを見て、キーと指を楽しくおぼえよう</p>
      </div>
      <button id="soundToggle" class="pill-btn" aria-pressed="true">🔊 おと ON</button>
    </header>

    <main class="layout">
      <section class="panel left-panel">
        <div class="mode-grid">
          <label>
            <span>れんしゅうモード</span>
            <select id="modeSelect">
              <option value="row">行ごと</option>
              <option value="sequence">あからじゅんばん</option>
              <option value="random">ランダム</option>
            </select>
          </label>

          <label>
            <span>れんしゅうする行</span>
            <select id="rowSelect"></select>
          </label>

          <label>
            <span>1セットのもんだい数</span>
            <select id="questionCount">
              <option>5</option>
              <option selected>10</option>
              <option>15</option>
              <option>20</option>
            </select>
          </label>
        </div>

        <div class="switches">
          <label class="check">
            <input type="checkbox" id="includeDakuon" checked />
            だくおん・はんだくおん
          </label>
          <label class="check">
            <input type="checkbox" id="includeCombo" checked />
            きゃ・きゅ・きょ など
          </label>
        </div>

        <div class="actions">
          <button id="startBtn" class="primary-btn">▶ はじめる</button>
          <button id="nextBtn" class="secondary-btn" disabled>つぎへ</button>
          <button id="repeatBtn" class="secondary-btn" disabled>🔁 もういちど</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span id="progressText">0 / 0</span>
            <span id="scoreText">せいかい 0</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill"></div>
          </div>
        </div>

        <div class="question-card" id="questionCard">
          <div class="question-header">
            <span class="badge" id="modeBadge">じゅんび</span>
            <span class="badge soft" id="fingerBadge">ゆびガイド</span>
          </div>

          <div class="kana-display" id="kanaDisplay">あ</div>
          <div class="romaji-display" id="romajiDisplay">a</div>
          <div class="instruction" id="instructionText">「はじめる」をおしてね</div>
        </div>

        <div class="feedback" id="feedbackArea"></div>
      </section>

      <section class="panel right-panel">
        <div class="keyboard-legend">
          <div><span class="dot left-pinky"></span>ひだり こゆび</div>
          <div><span class="dot left-ring"></span>ひだり くすりゆび</div>
          <div><span class="dot left-middle"></span>ひだり なかゆび</div>
          <div><span class="dot left-index"></span>ひだり ひとさしゆび</div>
          <div><span class="dot right-index"></span>みぎ ひとさしゆび</div>
          <div><span class="dot right-middle"></span>みぎ なかゆび</div>
          <div><span class="dot right-ring"></span>みぎ くすりゆび</div>
          <div><span class="dot right-pinky"></span>みぎ こゆび</div>
          <div><span class="dot thumb"></span>おやゆび</div>
        </div>

        <div id="keyboard" class="keyboard" aria-label="キーボードイラスト"></div>
        <div class="finger-guide" id="fingerGuide">ここに どのゆびを つかうか でるよ</div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
